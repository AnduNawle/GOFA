name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
      - master

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source code 🛎️
        uses: actions/checkout@v4

      - name: Setup Node.js ⚙️
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies 📦
        run: npm ci || npm install

      - name: Build Angular application 🛠️
        run: |
          npx ng build --configuration production --base-href /GOFA/
          # Copy index.html to 404.html to handle sub-routing with client-side routing
          cp dist/app/browser/index.html dist/app/browser/404.html

      - name: Deploy to GitHub Pages 🚀
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: dist/app/browser
          branch: gh-pages
